version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: resumai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resumai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-resumai_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumai_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resumai}:${POSTGRES_PASSWORD:-resumai_secret}@db:5432/${POSTGRES_DB:-resumai_db}
      FLASK_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "flask db upgrade && python run.py"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resumai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:5000/api

volumes:
  pgdata:
